# Alembic configuration.
#
# This file tells Alembic where the migrations live and how to run.
# Most settings are stock; the important customization is that we
# read DATABASE_URL from the environment (in env.py), so we leave
# sqlalchemy.url empty here.

[alembic]
# Path to migration scripts (relative to this file).
script_location = alembic

# How to template generated migration filenames.
# %%(year)d_%%(month).2d_%%(day).2d = leading-zero date prefix,
# good for chronological sorting.
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# Path separator for OS-independence.
path_separator = os

# Empty: env.py reads DATABASE_URL from app.config.
sqlalchemy.url =


# --- Logging ---
# Standard Python logging config. We keep it terse; alembic's default
# verbosity is fine for our needs.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
