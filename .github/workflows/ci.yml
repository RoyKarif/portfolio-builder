name: CI

# Runs on every push to any branch and on every pull request.
# Two parallel jobs: backend (pytest) and frontend (typecheck + build).

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest

    services:
      # Spin up a real Postgres for integration tests. Same image as
      # docker-compose so behavior matches production.
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: portfolio
          POSTGRES_PASSWORD: portfolio
          POSTGRES_DB: portfolio_builder_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run migrations on test DB
        working-directory: backend
        env:
          DATABASE_URL: postgresql://portfolio:portfolio@localhost:5432/portfolio_builder_test
          JWT_SECRET: ci-test-secret-not-used-in-prod
        run: alembic upgrade head

      - name: Run pytest
        working-directory: backend
        env:
          DATABASE_URL: postgresql://portfolio:portfolio@localhost:5432/portfolio_builder_test
          TEST_DATABASE_URL: postgresql://portfolio:portfolio@localhost:5432/portfolio_builder_test
          JWT_SECRET: ci-test-secret-not-used-in-prod
        run: pytest -v

  frontend:
    name: Frontend build + typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        # `npm ci` installs exactly what's pinned in package-lock.json
        # and fails if the lockfile is out of sync — gives us
        # reproducible CI builds (vs `npm install`, which mutates the
        # lockfile and may silently pick newer transitive versions).
        run: npm ci

      - name: TypeScript check + Vite build
        working-directory: frontend
        run: npm run build
